<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System Simulator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Solar System Simulator</h1>
      <p>
        Real-time orbital motion with adjustable time acceleration and scale
        visualization.
      </p>
    </header>

    <main class="layout">
      <section class="controls card">
        <div class="row">
          <label for="speed">Time rate</label>
          <input id="speed" type="range" min="0" max="20" step="1" value="12" list="speedTicks" />
          <datalist id="speedTicks">
            <option value="0" label="1x"></option>
            <option value="8" label="1 day/s"></option>
            <option value="10" label="1 week/s"></option>
            <option value="12" label="30 day/s"></option>
            <option value="13" label="1 year/s"></option>
            <option value="15" label="5 year/s"></option>
            <option value="16" label="10 year/s"></option>
            <option value="19" label="50 year/s"></option>
            <option value="20" label="100 year/s"></option>
          </datalist>
          <output id="speedOut">30 days / second</output>
          <div id="speedDetail" class="hint">about 2.59 million × realtime</div>
        </div>

        <div class="row">
          <label for="zoom">Zoom</label>
          <input id="zoom" type="range" min="25" max="1200" step="1" value="260" />
          <output id="zoomOut">260%</output>
        </div>

        <div class="row toggles">
          <label><input id="planetLabelsToggle" type="checkbox" checked /> Show planet labels</label>
          <label><input id="moonLabelsToggle" type="checkbox" checked /> Show moon labels</label>
        </div>

        <div class="row compact">
          <button id="pauseBtn" type="button">Pause</button>
          <button id="nowBtn" type="button">Return to Now</button>
        </div>

        <div class="row">
          <label for="scaleMode">Scale mode</label>
          <select id="scaleMode">
            <option value="exaggerated" selected>Exaggerated (recommended)</option>
            <option value="realistic">Distance-proportional</option>
          </select>
        </div>

        <div class="meta">
          <div><strong>Simulated UTC:</strong> <span id="simTime"></span></div>
          <div><strong>Mode note:</strong> <span id="scaleNote"></span></div>
        </div>
      </section>

      <section class="viewport card">
        <canvas id="simCanvas" width="1200" height="800" aria-label="Solar system visualization"></canvas>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
  </html>
