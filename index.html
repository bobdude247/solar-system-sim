<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System Simulator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Solar System Simulator</h1>
      <p>
        Real-time orbital motion with adjustable time acceleration and scale
        visualization.
      </p>
    </header>

    <main class="layout">
      <section class="controls card">
        <div class="row">
          <label for="speed">Time rate</label>
          <select id="speed">
            <option value="1">Real time (1x)</option>
            <option value="86400">1 day / second</option>
            <option value="604800">1 week / second</option>
            <option value="2592000">30 days / second</option>
            <option value="31557600" selected>1 year / second</option>
            <option value="157788000">5 years / second</option>
            <option value="315576000">10 years / second</option>
            <option value="1577880000">50 years / second</option>
            <option value="3155760000">100 years / second</option>
          </select>
          <output id="speedOut">1 year / second</output>
        </div>

        <div class="row compact">
          <button id="pauseBtn" type="button">Pause</button>
          <button id="nowBtn" type="button">Return to Now</button>
        </div>

        <div class="row">
          <label for="scaleMode">Scale mode</label>
          <select id="scaleMode">
            <option value="exaggerated" selected>Exaggerated (recommended)</option>
            <option value="realistic">Distance-proportional</option>
          </select>
        </div>

        <div class="meta">
          <div><strong>Simulated UTC:</strong> <span id="simTime"></span></div>
          <div><strong>Mode note:</strong> <span id="scaleNote"></span></div>
        </div>
      </section>

      <section class="viewport card">
        <canvas id="simCanvas" width="1200" height="800" aria-label="Solar system visualization"></canvas>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
  </html>
